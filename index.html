<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor | Photography Portfolio</title>
    <style>
        :root {
            /* Sophisticated warm grey */
            --bg-color: #e5e5e5; 
            --text-color: #1a1a1a;
            --accent-color: #888;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            position: relative;
        }

        /* The Grain Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

        /* Navigation */
        nav {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(229, 229, 229, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo { font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        nav ul { list-style: none; display: flex; gap: 2rem; margin: 0; }

        nav a { 
            text-decoration: none; 
            color: var(--text-color); 
            font-size: 0.8rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Sections */
        section { padding: 4rem 2rem; max-width: 1200px; margin: 0 auto; }
        h2 { font-weight: 300; text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 1rem; margin-bottom: 2rem; }

        /* Perfect Grid Alignment */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            grid-gap: 30px;
        }

        .photo-item { 
            background: #dcdcdc; 
            overflow: hidden; 
            aspect-ratio: 3 / 4; /* This keeps them all the same height/shape */
            width: 100%;
        }
        
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* This crops them to fit perfectly without stretching */
            object-position: center;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            display: block;
        }

        .photo-item img:hover { transform: scale(1.05); }

        /* Video Section */
        .video-container { margin-bottom: 2rem; }
        .video-placeholder { 
            background: #111; 
            width: 100%; 
            aspect-ratio: 16/9; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Contact Form */
        form { display: flex; flex-direction: column; gap: 1rem; max-width: 500px; }
        input, textarea { 
            padding: 1rem; 
            border: 1px solid rgba(0,0,0,0.1); 
            background: rgba(255,255,255,0.5);
            font-family: inherit; 
        }
        button { 
            background: #1a1a1a; 
            color: #fff; 
            padding: 1rem; 
            border: none; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: background 0.3s;
        }
        button:hover { background: #000; }

        footer { text-align: center; padding: 6rem 4rem 4rem; font-size: 0.7rem; color: var(--accent-color); letter-spacing: 1px; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">Victor</div>
        <ul>
            <li><a href="#photos">Photos</a></li>
            <li><a href="#videos">Videos</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="photos">
        <h2>Photography</h2>
        <div class="photo-grid">
            <div class="photo-item"><img src="images/fire.jpg" alt="Fire"></div>
            <div class="photo-item"><img src="images/bird.jpg" alt="Bird"></div>
            <div class="photo-item"><img src="images/woman.jpg" alt="Woman"></div>
            <div class="photo-item"><img src="images/sun.jpg" alt="Sun"></div>
            <div class="photo-item"><img src="images/skye.jpg" alt="Skye"></div>
            </div>
    </section>

    <section id="videos">
        <h2>Film</h2>
        <div class="video-container">
            <div class="video-placeholder">Embed Vimeo/YouTube Here</div>
        </div>
    </section>

    <section id="about">
        <h2>About Me</h2>
        <p>I am a lifestyle and commercial photographer capturing authentic moments and high-end visual stories.</p>
    </section>

    <section id="contact">
        <h2>Contact</h2>
        <form>
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <textarea rows="5" placeholder="Your Message"></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <footer>
        &copy; 2026 Victor Photography. All rights reserved.
    </footer>

</body>
</html>
